<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OCR: Image to Text</title>
<style>
  :root { --bg:#0b1020; --card:#141b34; --fg:#e8ecf6; --muted:#9aa5c4; --accent:#4f8cff; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
         background:var(--bg); color:var(--fg); min-height:100vh; }
  .wrap { max-width: 820px; margin: 0 auto; padding: 32px 20px 64px; }
  h1 { font-size: 1.6rem; margin: 0 0 4px; }
  p.sub { color: var(--muted); margin: 0 0 24px; }
  .card { background:var(--card); border:1px solid #243056; border-radius:14px; padding:20px; margin-bottom:18px; }
  label { display:block; font-size:.85rem; color:var(--muted); margin-bottom:8px; }
  input[type=file], select { width:100%; padding:10px; border-radius:9px; border:1px solid #2c3a66;
         background:#0f1730; color:var(--fg); }
  .row { display:flex; gap:14px; flex-wrap:wrap; }
  .row > div { flex:1 1 200px; }
  button { margin-top:16px; background:var(--accent); color:#fff; border:0; padding:12px 20px;
         border-radius:9px; font-size:1rem; cursor:pointer; font-weight:600; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  img#preview { max-width:100%; border-radius:9px; margin-top:14px; display:none; }
  textarea { width:100%; min-height:240px; margin-top:6px; padding:12px; border-radius:9px;
         border:1px solid #2c3a66; background:#0f1730; color:var(--fg); font-family: ui-monospace, monospace; font-size:.9rem; }
  .bar { height:8px; background:#0f1730; border-radius:6px; overflow:hidden; margin-top:14px; display:none; }
  .bar > i { display:block; height:100%; width:0; background:var(--accent); transition:width .2s; }
  .status { color:var(--muted); font-size:.85rem; margin-top:10px; min-height:1.2em; }
  footer { color:var(--muted); font-size:.8rem; text-align:center; margin-top:30px; }
  a { color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <h1>OCR: Image to Text</h1>
  <p class="sub">Upload an image and extract its text with Tesseract, runs entirely in your browser. No server, no upload of your image anywhere.</p>

  <div class="card">
    <div class="row">
      <div>
        <label for="file">Image</label>
        <input type="file" id="file" accept="image/*" />
      </div>
      <div>
        <label for="lang">Language</label>
        <select id="lang">
          <option value="eng" selected>English (eng)</option>
          <option value="fra">French (fra)</option>
          <option value="deu">German (deu)</option>
          <option value="spa">Spanish (spa)</option>
          <option value="hin">Hindi (hin)</option>
          <option value="eng+hin">English + Hindi</option>
        </select>
      </div>
    </div>
    <img id="preview" alt="preview" />
    <button id="run" disabled>Extract text</button>
    <div class="bar"><i id="prog"></i></div>
    <div class="status" id="status"></div>
  </div>

  <div class="card">
    <label for="out">Extracted text</label>
    <textarea id="out" placeholder="Results appear here..."></textarea>
  </div>

  <footer>
    Powered by <a href="https://github.com/naptha/tesseract.js" target="_blank" rel="noopener">tesseract.js</a> (open-source Tesseract in WebAssembly).
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
  const fileEl = document.getElementById('file');
  const runEl = document.getElementById('run');
  const outEl = document.getElementById('out');
  const statusEl = document.getElementById('status');
  const preview = document.getElementById('preview');
  const bar = document.querySelector('.bar');
  const prog = document.getElementById('prog');
  let chosen = null;

  fileEl.addEventListener('change', () => {
    chosen = fileEl.files[0] || null;
    runEl.disabled = !chosen;
    if (chosen) {
      preview.src = URL.createObjectURL(chosen);
      preview.style.display = 'block';
      statusEl.textContent = '';
    }
  });

  runEl.addEventListener('click', async () => {
    if (!chosen) return;
    const lang = document.getElementById('lang').value;
    runEl.disabled = true;
    outEl.value = '';
    bar.style.display = 'block';
    prog.style.width = '0%';
    statusEl.textContent = 'Loading OCR engine and language data (first run downloads ~10-15MB)...';
    try {
      const { data } = await Tesseract.recognize(chosen, lang, {
        logger: m => {
          if (m.status === 'recognizing text') {
            prog.style.width = Math.round(m.progress * 100) + '%';
            statusEl.textContent = 'Recognizing text... ' + Math.round(m.progress * 100) + '%';
          } else {
            statusEl.textContent = m.status + (m.progress ? ' ' + Math.round(m.progress * 100) + '%' : '');
          }
        }
      });
      outEl.value = (data.text || '').trim() || 'No text detected.';
      statusEl.textContent = 'Done.';
      prog.style.width = '100%';
    } catch (e) {
      statusEl.textContent = 'Error: ' + e.message;
    } finally {
      runEl.disabled = false;
    }
  });
</script>
</body>
</html>
